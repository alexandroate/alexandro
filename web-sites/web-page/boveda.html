<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bóveda de Archivos | Sistema</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/arcade.css"> 
    <link rel="stylesheet" href="css/boveda.css">
</head>
<body class="boveda-body">

    <nav class="arcade-nav" style="position: sticky; top: 0; z-index: 100;">
        <a href="panel.html" class="btn-back">
            <span class="material-symbols-outlined">arrow_back</span> Volver al Panel
        </a>
        <h2 class="arcade-title">Archivos Recuperados</h2>
        <div style="width: 100px;"></div>
    </nav>

    <main class="gallery-wrapper">
        <p class="gallery-intro">Base de datos desencriptada con éxito. Mostrando los registros de nuestra mejor versión hasta la fecha.</p>
        
        <div class="gallery-grid">
            
            <div class="gallery-item">
                <img src="img/primer-capitulo.jpg" alt="Recuerdo 1" class="gallery-img">
                <div class="img-overlay">
                    <p>El primer gran capítulo</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="img/creciendo-juntos.jpeg" alt="Recuerdo 2" class="gallery-img">
                <div class="img-overlay">
                    <p>Creciendo juntos</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="img/conexion.jpeg" alt="Recuerdo 3" class="gallery-img">
                <div class="img-overlay">
                    <p>La reconexión</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="img/presente.jpeg" alt="Recuerdo 4" class="gallery-img">
                <div class="img-overlay">
                    <p>Rumbo a tus 26 años</p>
                </div>
            </div>

        </div>
    </main>

    <div id="lightbox" class="hidden lightbox-modal">
        <span class="material-symbols-outlined close-lightbox" id="btn-close">close</span>
        <img id="lightbox-img" src="" alt="Vista ampliada">
        <p id="lightbox-caption" class="lightbox-caption"></p>
    </div>

    <script src="js/boveda.js"></script>
</body>
</html>
