<!-- DOCTYPE indica que estamos usando la Versión HTML5 -->
<!DOCTYPE html>
<!-- Estructura básica de una página HTML -->
<html lang="es"> <!-- El atributo lang indica el idioma del contenido de la página (es = español)-->
    <!-- La sección head contiene información sobre el documento, como su título, enlaces a hojas de estilo, scripts, etc. -->
    <head>
        <meta charset="UTF-8"> <!-- Define la codificación de caracteres del documento como UTF-8 -->
        <title>Curso de HTML</title>
        <meta name="description" content="Curso de HTML para principiantes"> <!-- Proporciona una descripción del contenido de la página -->

        <link rel="icon" href="icon.png"> <!-- Enlaza un icono que se muestra en la pestaña del navegador -->
        <link rel="stylesheet" href="style.css"> <!-- Enlaza una hoja de estilo CSS externa para dar estilo a la página -->
        
    </head>
    <body>
        <h1>niños</h1>
        

        <script src="script.js"></script> <!-- Enlaza un archivo JavaScript externo para agregar interactividad a la página -->
    </body>
</html>
